# ==========================================
#   LinkVault - URL Shortener Configuration
# ==========================================

# Server
server.port=8080
server.error.whitelabel.enabled=false

# Application Base URL (change this to your domain in production)
app.base-url=http://localhost:8080
app.short-code-length=6

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/linkvault?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# Logging
logging.level.com.urlshortener=DEBUG
logging.level.org.springframework.security=WARN

# Session
server.servlet.session.timeout=30m

# Admin credentials (change in production!)
app.admin.username=admin
app.admin.password=admin123
app.admin.api-key=lv_sk_change_this_in_production
