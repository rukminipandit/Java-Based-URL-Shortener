<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protected Link — LinkVault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="protected-page">

<div class="protected-container">
    <div class="protected-card">
        <div class="lock-icon">🔒</div>
        <h1 class="protected-title">Protected Link</h1>
        <p class="protected-subtitle">
            This link is password protected.
            <br>
            <span th:if="${domain}" th:text="'Destination: ' + ${domain}" class="protected-domain"></span>
        </p>

        <div class="error-banner small" th:if="${error}">
            <span>⚠</span> <span th:text="${error}"></span>
        </div>

        <form th:action="@{'/protected/' + ${shortCode}}" method="post" class="protected-form">
            <div class="pwd-field-wrap">
                <input type="password" name="password" id="pwdInput"
                       placeholder="Enter password"
                       class="protected-pwd-input" autofocus required />
                <button type="button" class="pwd-toggle-btn-sm" onclick="togglePwdVisibilityById('pwdInput', this)">👁</button>
            </div>
            <button type="submit" class="protected-submit-btn">
                Unlock &amp; Continue →
            </button>
        </form>

        <a href="/" class="back-link">← Back to LinkVault</a>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
