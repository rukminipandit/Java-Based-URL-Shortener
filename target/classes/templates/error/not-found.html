<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not Found — LinkVault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="error-page">
    <div class="error-container">
        <div class="error-code" th:text="${errorCode ?: '404'}">404</div>
        <h1 class="error-title">Link not found</h1>
        <p class="error-msg" th:text="${errorMessage ?: 'This short link does not exist or has been removed.'}"></p>
        <a href="/" class="shorten-btn">← Go Back Home</a>
    </div>
</body>
</html>
