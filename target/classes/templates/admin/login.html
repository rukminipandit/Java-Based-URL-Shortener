<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — LinkVault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="login-page">

<div class="login-container">
    <div class="login-card">
        <a href="/" class="nav-logo big">Link<span>Vault</span></a>
        <h2 class="login-title">Admin Access</h2>

        <div class="error-banner" th:if="${loginError}">
            <span>⚠</span> Invalid username or password.
        </div>

        <form th:action="@{/admin/login}" method="post" class="login-form">
            <div class="login-field">
                <label>Username</label>
                <input type="text" name="username" placeholder="admin" autofocus required />
            </div>
            <div class="login-field">
                <label>Password</label>
                <div class="pwd-field-wrap">
                    <input type="password" name="password" id="loginPwd" placeholder="••••••••" required />
                    <button type="button" class="pwd-toggle-btn-sm" onclick="togglePwdVisibilityById('loginPwd', this)">👁</button>
                </div>
            </div>
            <button type="submit" class="login-btn">Sign In →</button>
        </form>

        <a href="/" class="back-link">← Back to Homepage</a>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
