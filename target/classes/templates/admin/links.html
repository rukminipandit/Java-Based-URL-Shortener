<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Links — LinkVault Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="admin-page">

<aside class="sidebar">
    <div class="sidebar-logo">Link<span>Vault</span></div>
    <nav class="sidebar-nav">
        <a href="/admin/dashboard" class="sidebar-link"><span class="sidebar-icon">▤</span> Dashboard</a>
        <a href="/admin/links" class="sidebar-link active"><span class="sidebar-icon">🔗</span> All Links</a>
        <a href="/admin/api-keys" class="sidebar-link"><span class="sidebar-icon">🔑</span> API Keys</a>
        <a href="/" class="sidebar-link"><span class="sidebar-icon">⌂</span> Homepage</a>
    </nav>
    <div class="sidebar-footer">
        <form th:action="@{/admin/logout}" method="post">
            <button type="submit" class="logout-btn">Sign Out</button>
        </form>
    </div>
</aside>

<main class="admin-main">
    <header class="admin-header">
        <h1 class="admin-page-title">All Links</h1>
        <a href="/" class="header-action-btn">+ New Link</a>
    </header>

    <div th:if="${successMessage}" class="alert-success" th:text="${successMessage}"></div>

    <!-- Search Bar -->
    <div class="card search-card">
        <form method="get" action="/admin/links" class="search-form">
            <input type="text" name="query" th:value="${query}"
                   placeholder="Search by URL, title, or short code..."
                   class="search-input" />
            <button type="submit" class="search-btn">Search</button>
            <a th:if="${!#strings.isEmpty(query)}" href="/admin/links" class="clear-btn">Clear</a>
        </form>
    </div>

    <!-- Links Table -->
    <div class="card">
        <div class="table-wrap">
            <table class="data-table">
                <thead>
                    <tr>
                        <th><a th:href="@{/admin/links(sort='shortCode', dir=${sort == 'shortCode' && dir == 'asc' ? 'desc' : 'asc'}, query=${query})}">Short Code</a></th>
                        <th>Title / Destination</th>
                        <th><a th:href="@{/admin/links(sort='clickCount', dir=${sort == 'clickCount' && dir == 'asc' ? 'desc' : 'asc'}, query=${query})}">Clicks ↕</a></th>
                        <th>Features</th>
                        <th>Status</th>
                        <th><a th:href="@{/admin/links(sort='createdAt', dir=${sort == 'createdAt' && dir == 'asc' ? 'desc' : 'asc'}, query=${query})}">Created ↕</a></th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="link : ${linksPage.content}">
                        <td>
                            <div class="code-cell-wrap">
                                <code class="short-code-cell" th:text="'/' + ${link.shortCode}"></code>
                                <button class="copy-icon-btn"
                                        th:data-copy="${baseUrl + link.shortCode}"
                                        onclick="copyToClipboard(this)" title="Copy link">⧉</button>
                            </div>
                        </td>
                        <td>
                            <p class="link-title" th:text="${link.title}"></p>
                            <a th:href="${link.originalUrl}" th:text="${link.originalUrlPreview}"
                               target="_blank" class="url-cell small"></a>
                        </td>
                        <td><strong th:text="${link.clickCount}"></strong></td>
                        <td>
                            <div class="features-badges">
                                <span th:if="${link.analyticsEnabled}" class="feature-tag analytics-tag" title="Analytics">📊 Analytics</span>
                                <span th:if="${link.passwordProtected}" class="feature-tag lock-tag" title="Password Protected">🔒 Protected</span>
                            </div>
                        </td>
                        <td>
                            <span th:class="${link.active} ? 'status-badge active' : 'status-badge inactive'"
                                  th:text="${link.active} ? 'Active' : 'Disabled'"></span>
                        </td>
                        <td class="date-cell" th:text="${#temporals.format(link.createdAt, 'MMM dd, yyyy')}"></td>
                        <td class="actions-cell">
                            <a th:href="@{'/admin/links/' + ${link.id} + '/analytics'}" class="action-btn">Analytics</a>
                            <button class="action-btn toggle-btn"
                                    th:data-id="${link.id}"
                                    th:data-active="${link.active}"
                                    onclick="toggleLink(this)">
                                <span th:text="${link.active} ? 'Disable' : 'Enable'"></span>
                            </button>
                            <form th:action="@{'/admin/links/' + ${link.id} + '/delete'}" method="post"
                                  style="display:inline"
                                  onsubmit="return confirm('Delete this link and all its analytics?')">
                                <button type="submit" class="action-btn danger-btn">Delete</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${linksPage.totalElements == 0}">
                        <td colspan="7" class="empty-row">
                            <span th:if="${!#strings.isEmpty(query)}">No links match your search.</span>
                            <span th:if="${#strings.isEmpty(query)}">No links yet. <a href="/">Create your first →</a></span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="pagination" th:if="${linksPage.totalPages > 1}">
            <a th:href="@{/admin/links(page=${linksPage.number - 1}, query=${query}, sort=${sort}, dir=${dir})}"
               th:class="${linksPage.first} ? 'page-btn disabled' : 'page-btn'">← Prev</a>

            <span class="page-info"
                  th:text="'Page ' + (${linksPage.number + 1}) + ' of ' + ${linksPage.totalPages}"></span>

            <a th:href="@{/admin/links(page=${linksPage.number + 1}, query=${query}, sort=${sort}, dir=${dir})}"
               th:class="${linksPage.last} ? 'page-btn disabled' : 'page-btn'">Next →</a>
        </div>
    </div>
</main>

<script>
    async function toggleLink(btn) {
        const id = btn.dataset.id;
        const isActive = btn.dataset.active === 'true';
        const res = await fetch(`/admin/links/${id}/toggle`, { method: 'POST' });
        const data = await res.json();
        btn.dataset.active = data.active;
        btn.querySelector('span').textContent = data.active ? 'Disable' : 'Enable';
        const row = btn.closest('tr');
        const badge = row.querySelector('.status-badge');
        badge.textContent = data.active ? 'Active' : 'Disabled';
        badge.className = data.active ? 'status-badge active' : 'status-badge inactive';
    }

    function copyToClipboard(btn) {
        const text = btn.dataset.copy;
        navigator.clipboard.writeText(text).then(() => {
            const orig = btn.textContent;
            btn.textContent = '✓';
            setTimeout(() => btn.textContent = orig, 1500);
        });
    }
</script>
</body>
</html>
